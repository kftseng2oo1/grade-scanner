<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2d5e"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde8f8"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd060" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffd060" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff9a00" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="score-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffd060"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="roundclip">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#7ab3ff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Paper / exam sheet (tilted slightly) -->
  <g filter="url(#softshadow)" transform="rotate(-4,256,256)">
    <rect x="118" y="88" width="240" height="310" rx="12" fill="url(#paper)"/>
  </g>

  <!-- Paper lines (rows) -->
  <g transform="rotate(-4,256,256)" opacity="0.18" stroke="#1a4fa0" stroke-width="2.5">
    <line x1="142" y1="148" x2="334" y2="148"/>
    <line x1="142" y1="172" x2="310" y2="172"/>
    <line x1="142" y1="196" x2="320" y2="196"/>
    <line x1="142" y1="220" x2="300" y2="220"/>
    <line x1="142" y1="244" x2="315" y2="244"/>
  </g>

  <!-- Student ID boxes row -->
  <g transform="rotate(-4,256,256)">
    <rect x="142" y="108" width="14" height="18" rx="2" fill="none" stroke="#1a4fa0" stroke-width="2" opacity="0.4"/>
    <rect x="160" y="108" width="14" height="18" rx="2" fill="none" stroke="#1a4fa0" stroke-width="2" opacity="0.4"/>
    <rect x="178" y="108" width="14" height="18" rx="2" fill="none" stroke="#1a4fa0" stroke-width="2" opacity="0.4"/>
    <rect x="196" y="108" width="14" height="18" rx="2" fill="none" stroke="#1a4fa0" stroke-width="2" opacity="0.4"/>
    <rect x="214" y="108" width="14" height="18" rx="2" fill="none" stroke="#1a4fa0" stroke-width="2" opacity="0.4"/>
    <rect x="232" y="108" width="14" height="18" rx="2" fill="none" stroke="#1a4fa0" stroke-width="2" opacity="0.4"/>
    <rect x="250" y="108" width="14" height="18" rx="2" fill="none" stroke="#1a4fa0" stroke-width="2" opacity="0.4"/>
    <!-- Score box -->
    <rect x="152" y="268" width="80" height="50" rx="4" fill="none" stroke="#1a4fa0" stroke-width="2.5" opacity="0.4"/>
  </g>

  <!-- Gold scan beam sweeping across paper -->
  <rect x="100" y="195" width="312" height="48" fill="url(#beam)" opacity="0.85" rx="4"
        transform="rotate(-4,256,256)"/>
  <!-- Beam edge line -->
  <line x1="100" y1="219" x2="412" y2="202" stroke="#ffd060" stroke-width="2.5" opacity="0.9"
        transform="rotate(-4,256,256)" filter="url(#glow)"/>

  <!-- Score badge (bottom right of paper) -->
  <g transform="rotate(-4,256,256)">
    <rect x="264" y="265" width="72" height="56" rx="8" fill="url(#score-grad)" opacity="0.92"/>
    <text x="300" y="302" text-anchor="middle" font-family="Georgia,serif" font-weight="700"
          font-size="28" fill="#fff" filter="url(#glow)">98</text>
  </g>

  <!-- AI scan dots (recognition points) -->
  <g filter="url(#glow)">
    <circle cx="178" cy="202" r="5" fill="#ffd060"/>
    <circle cx="220" cy="200" r="4" fill="#ffd060" opacity="0.8"/>
    <circle cx="262" cy="204" r="5.5" fill="#ffd060"/>
    <circle cx="305" cy="201" r="4" fill="#ffd060" opacity="0.8"/>
    <circle cx="344" cy="203" r="5" fill="#ffd060"/>
  </g>

  <!-- Corner accent marks -->
  <g stroke="#4a9fff" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M80 80 L80 105 M80 80 L105 80"/>
    <path d="M432 80 L432 105 M432 80 L407 80"/>
    <path d="M80 432 L80 407 M80 432 L105 432"/>
    <path d="M432 432 L432 407 M432 432 L407 432"/>
  </g>

  <!-- AI chip icon top-right -->
  <g transform="translate(356,60)">
    <rect width="52" height="52" rx="10" fill="#1a4fa0" opacity="0.85"/>
    <rect x="8" y="8" width="36" height="36" rx="6" fill="none" stroke="#4a9fff" stroke-width="2"/>
    <!-- chip pins -->
    <g stroke="#7ab3ff" stroke-width="2" stroke-linecap="round">
      <line x1="15" y1="8" x2="15" y2="3"/><line x1="26" y1="8" x2="26" y2="3"/><line x1="37" y1="8" x2="37" y2="3"/>
      <line x1="15" y1="44" x2="15" y2="49"/><line x1="26" y1="44" x2="26" y2="49"/><line x1="37" y1="44" x2="37" y2="49"/>
      <line x1="8" y1="15" x2="3" y2="15"/><line x1="8" y1="26" x2="3" y2="26"/><line x1="8" y1="37" x2="3" y2="37"/>
      <line x1="44" y1="15" x2="49" y2="15"/><line x1="44" y1="26" x2="49" y2="26"/><line x1="44" y1="37" x2="49" y2="37"/>
    </g>
    <circle cx="26" cy="26" r="6" fill="#4a9fff" opacity="0.9"/>
    <circle cx="26" cy="26" r="3" fill="#ffd060"/>
  </g>

</svg>